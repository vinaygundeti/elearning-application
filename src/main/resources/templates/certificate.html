<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Certificate of Completion</title>

    <style>

        body{
            background:#f4f4f4;
            font-family:Georgia, serif;
        }

        .certificate{
            width:900px;
            margin:40px auto;
            padding:40px;
            background:white;
            border:10px solid #c9a227;
            text-align:center;
            box-shadow:0 0 15px gray;
        }

        h1{
            color:#c9a227;
            font-size:48px;
        }

        h2{
            font-size:35px;
        }

        p{
            font-size:24px;
        }

        .name{
            font-size:40px;
            color:darkblue;
            font-weight:bold;
        }

        .course{
            font-size:34px;
            color:green;
            font-weight:bold;
        }

        .footer{
            margin-top:80px;
            display:flex;
            justify-content:space-between;
        }

        .print-btn{
            margin-top:40px;
            padding:12px 30px;
            background:#28a745;
            color:white;
            border:none;
            font-size:18px;
            cursor:pointer;
        }

        .back{
            display:block;
            margin-top:25px;
            font-size:18px;
        }

    </style>

</head>

<body>

<div class="certificate">

    <h1>🏆 Certificate of Completion</h1>

    <p>This Certificate is proudly presented to</p>

    <div class="name" th:text="${studentName}"></div>

    <p>for successfully completing the course</p>

    <div class="course" th:text="${courseName}"></div>

    <br>

    <p><b>Date:</b> June 2026</p>

    <p>
        We appreciate your dedication and wish you
        great success in your career.
    </p>

    <div class="footer">

        <div>
            ___________________<br>
            Trainer Signature
        </div>

        <div>
            ___________________<br>
            Director
        </div>

    </div>

    <button class="print-btn" onclick="window.print()">
        Print Certificate
    </button>

    <br>

    <a class="back" href="/my-courses">
        ⬅ Back to My Courses
    </a>

</div>

</body>
</html>
